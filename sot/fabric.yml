---
fabric:
  name: evpn-lab
  description: 2 spine, 2 leaf EVPN/VXLAN validation lab

devices:
  spine1:
    hostname: spine1
    role: spine
    platform: arista_eos
    asn: 65001
    loopback0: 10.255.0.1/32
    interfaces:
      Ethernet1:
        description: to leaf1 Ethernet1
        type: routed
        ip_address: 10.0.11.0/31
        peer: leaf1
        peer_interface: Ethernet1
      Ethernet2:
        description: to leaf2 Ethernet1
        type: routed
        ip_address: 10.0.12.0/31
        peer: leaf2
        peer_interface: Ethernet1

  spine2:
    hostname: spine2
    role: spine
    platform: arista_eos
    asn: 65002
    loopback0: 10.255.0.2/32
    interfaces:
      Ethernet1:
        description: to leaf1 Ethernet2
        type: routed
        ip_address: 10.0.21.0/31
        peer: leaf1
        peer_interface: Ethernet2
      Ethernet2:
        description: to leaf2 Ethernet2
        type: routed
        ip_address: 10.0.22.0/31
        peer: leaf2
        peer_interface: Ethernet2

  leaf1:
    hostname: leaf1
    role: leaf
    platform: arista_eos
    asn: 65101
    loopback0: 10.255.0.11/32
    loopback1: 10.255.1.11/32
    interfaces:
      Ethernet1:
        description: to spine1 Ethernet1
        type: routed
        ip_address: 10.0.11.1/31
        peer: spine1
        peer_interface: Ethernet1
      Ethernet2:
        description: to spine2 Ethernet1
        type: routed
        ip_address: 10.0.21.1/31
        peer: spine2
        peer_interface: Ethernet1
      Ethernet3:
        description: to host1 eth1
        type: access
        vlan: 10
        peer: host1
        peer_interface: eth1
      Ethernet4:
        description: to host2 eth1
        type: access
        vlan: 20
        peer: host2
        peer_interface: eth1

  leaf2:
    hostname: leaf2
    role: leaf
    platform: arista_eos
    asn: 65102
    loopback0: 10.255.0.12/32
    loopback1: 10.255.1.12/32
    interfaces:
      Ethernet1:
        description: to spine1 Ethernet2
        type: routed
        ip_address: 10.0.12.1/31
        peer: spine1
        peer_interface: Ethernet2
      Ethernet2:
        description: to spine2 Ethernet2
        type: routed
        ip_address: 10.0.22.1/31
        peer: spine2
        peer_interface: Ethernet2
      Ethernet3:
        description: to host3 eth1
        type: access
        vlan: 10
        peer: host3
        peer_interface: eth1
      Ethernet4:
        description: to host4 eth1
        type: access
        vlan: 20
        peer: host4
        peer_interface: eth1

hosts:
  host1:
    attached_to: leaf1
    interface: eth1
    leaf_interface: Ethernet3
    vlan: 10
    ip: 192.168.10.11
    prefix_length: 24
    gateway: 192.168.10.1

  host2:
    attached_to: leaf1
    interface: eth1
    leaf_interface: Ethernet4
    vlan: 20
    ip: 192.168.20.11
    prefix_length: 24
    gateway: 192.168.20.1

  host3:
    attached_to: leaf2
    interface: eth1
    leaf_interface: Ethernet3
    vlan: 10
    ip: 192.168.10.12
    prefix_length: 24
    gateway: 192.168.10.1

  host4:
    attached_to: leaf2
    interface: eth1
    leaf_interface: Ethernet4
    vlan: 20
    ip: 192.168.20.12
    prefix_length: 24
    gateway: 192.168.20.1
